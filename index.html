<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Gummy House — мир сладостей</title>
    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', 'Segoe UI', sans-serif;
            background: #fff5f0;
            color: #3d2522;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255, 248, 245, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 50px;
            padding: 30px 25px 40px;
            box-shadow: 0 20px 60px rgba(255, 150, 120, 0.2);
            border: 3px solid #ffe0d0;
            min-height: 90vh;
        }

        /* ===== НАВИГАЦИЯ ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
            gap: 15px;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #f9a0a0, #fbd68f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            text-shadow: 0 4px 20px rgba(255, 180, 100, 0.3);
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #ffe4d4;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            color: #4d2e2a;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 0 #dbaa8a;
            border: 2px solid #ffdcc8;
            user-select: none;
        }

        .nav-btn:hover {
            background: #ffd8c4;
            transform: translateY(-2px);
        }

        .nav-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #dbaa8a;
        }

        .nav-btn.active {
            background: #fcc8b0;
            border-color: #e8a888;
            box-shadow: 0 4px 0 #c48768;
        }

        .cart-badge {
            background: #ff6b4a;
            color: #fff;
            border-radius: 50%;
            padding: 2px 10px;
            font-size: 0.9rem;
            margin-left: 6px;
        }

        /* ===== СТРАНИЦЫ ===== */
        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== ГЛАВНАЯ ===== */
        .hero-title {
            font-size: 3.8rem;
            font-weight: 800;
            text-align: center;
            color: #4d2e2a;
            margin: 20px 0 10px;
            line-height: 1.2;
        }

        .hero-title span {
            background: linear-gradient(135deg, #f9a0a0, #fbd68f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-sub {
            text-align: center;
            font-size: 1.3rem;
            color: #7a524a;
            margin-bottom: 30px;
        }

        .features {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px 40px;
            margin: 30px 0 40px;
        }

        .feature-item {
            background: #fffbf8;
            padding: 16px 30px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
            border: 3px solid #ffddd0;
            box-shadow: 0 6px 0 #f0c8b4;
            color: #4d2e2a;
        }

        .feature-item span {
            font-size: 1.6rem;
            margin-right: 10px;
        }

        /* сетка фото на главной */
        .hero-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .hero-gallery img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 40px;
            border: 4px solid #ffede4;
            box-shadow: 0 8px 20px rgba(255, 150, 100, 0.2);
            background: #ffdccb;
        }

        /* ===== КАТАЛОГ ===== */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .product-card {
            background: #fffbf9;
            border-radius: 40px;
            padding: 18px 14px 20px;
            text-align: center;
            border: 3px solid #ffede4;
            box-shadow: 0 8px 20px rgba(255, 160, 120, 0.12);
            transition: 0.25s;
        }

        .product-card:hover {
            transform: translateY(-6px);
            border-color: #fbc4a0;
            box-shadow: 0 18px 40px rgba(255, 140, 100, 0.2);
        }

        .product-card img {
            width: 100%;
            max-width: 170px;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 50px;
            background: #ffe2d0;
            border: 3px solid #fff2e7;
            margin-bottom: 10px;
        }

        .product-card h3 {
            font-size: 1.2rem;
            color: #3d2522;
            margin: 6px 0 4px;
        }

        .product-card .price {
            font-size: 1.6rem;
            font-weight: 800;
            color: #c45a4a;
            margin: 6px 0 10px;
        }

        .add-btn {
            background: #faccb0;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.95rem;
            color: #3d2522;
            cursor: pointer;
            box-shadow: 0 4px 0 #dba284;
            transition: 0.08s linear;
            width: 100%;
        }

        .add-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #dba284;
        }

        .add-btn.added {
            background: #b8d9b0;
            box-shadow: 0 4px 0 #7fa878;
        }

        /* ===== КОРЗИНА ===== */
        .cart-items {
            margin: 20px 0;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fffbf8;
            padding: 14px 20px;
            border-radius: 30px;
            margin-bottom: 12px;
            border: 2px solid #ffe0d0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .cart-item .name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .cart-item .qty {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .cart-item .qty button {
            background: #ffe0d0;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            color: #4d2e2a;
        }

        .cart-item .qty button:active {
            background: #fcc8b0;
        }

        .cart-total {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: right;
            padding: 20px 10px 10px;
            border-top: 4px dashed #fadac8;
            margin-top: 20px;
        }

        .empty-cart {
            text-align: center;
            font-size: 1.4rem;
            color: #a77369;
            padding: 40px 0;
        }

        /* ===== ФУТЕР ===== */
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 4px dashed #fadac8;
            text-align: center;
            color: #7a5c56;
            font-weight: 500;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 640px) {
            .container { padding: 18px 12px; }
            .logo { font-size: 2.2rem; }
            .hero-title { font-size: 2.4rem; }
            .nav-btn { padding: 10px 18px; font-size: 0.9rem; }
            .features { gap: 12px; }
            .feature-item { padding: 12px 20px; font-size: 0.95rem; }
            .catalog-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ===== ШАПКА ===== -->
    <header class="header">
        <div class="logo">🍬 Gummy House</div>
        <div class="nav-buttons">
            <button class="nav-btn active" data-page="home">🏠 Главная</button>
            <button class="nav-btn" data-page="catalog">🍭 Каталог</button>
            <button class="nav-btn" data-page="cart">🛒 Корзина <span class="cart-badge" id="cartCount">0</span></button>
        </div>
    </header>

    <!-- ========================================= -->
    <!-- ===== ГЛАВНАЯ ===== -->
    <!-- ========================================= -->
    <section class="page active" id="page-home">
        <h1 class="hero-title">Добро пожаловать в <span>мир сладостей</span> 🍬</h1>
        <p class="hero-sub">Gummy House — мармелад, который дарит улыбки!</p>

        <div class="features">
            <div class="feature-item"><span>🍊</span> Натуральный сок</div>
            <div class="feature-item"><span>✅</span> Халяль</div>
            <div class="feature-item"><span>🩺</span> Без сахара для диабетиков</div>
        </div>

        <div class="hero-gallery">
            <img src="delfin.png" alt="Мармелад мишки" onerror="this.src='https://placehold.co/300x300/fde8db/c45a4a?text=🐻'">
            <img src="banana.png" alt="Мармелад бананы" onerror="this.src='https://placehold.co/300x300/fde8db/c45a4a?text=🍌'">
            <img src="mix.png" alt="Мармеладный микс" onerror="this.src='https://placehold.co/300x300/fde8db/c45a4a?text=🌈'">
            <img src="ribbon-strawberry.png" alt="Ленточки клубника" onerror="this.src='https://placehold.co/300x300/fde8db/c45a4a?text=🍓'">
            <img src="ribbon-cherry.png" alt="Ленточки вишня" onerror="this.src='https://placehold.co/300x300/fde8db/c45a4a?text=🍒'">
        </div>

        <div style="text-align: center; margin: 20px 0 10px;">
            <button class="nav-btn" data-page="catalog" style="font-size:1.3rem; padding:16px 50px;">
                🛍️ Смотреть каталог
            </button>
        </div>
    </section>

    <!-- ========================================= -->
    <!-- ===== КАТАЛОГ ===== -->
    <!-- ========================================= -->
    <section class="page" id="page-catalog">
        <h2 style="font-size:2.4rem; margin-bottom:20px; color:#4d2e2a;">🍭 Наш мармелад</h2>
        <div class="catalog-grid" id="catalogGrid">
            <!-- товары заполняются из JavaScript -->
        </div>
    </section>

    <!-- ========================================= -->
    <!-- ===== КОРЗИНА ===== -->
    <!-- ========================================= -->
    <section class="page" id="page-cart">
        <h2 style="font-size:2.4rem; margin-bottom:20px; color:#4d2e2a;">🛒 Корзина</h2>
        <div id="cartContent">
            <div class="empty-cart">🛍️ Корзина пуста. Добавьте сладости!</div>
        </div>
    </section>

    <!-- ===== ФУТЕР ===== -->
    <div class="footer">
        ©️ 2026 Gummy House — сделано с любовью к сладкому 💖
    </div>

</div>

<script>
    // ============================================================
    //  ТОВАРЫ (все пути исправлены на .png)
    // ============================================================
    const products = [
        { id: 1, name: 'Дельфинчики',         desc: '100 г', price: 150, img: 'delfin.png' },
        { id: 2, name: 'Бананчики с нутеллой','desc: 100 г', price: 100, img: 'banana.png' },
        { id: 3, name: 'Мармеладный микс',    desc: '200 г', price: 200, img: 'mix.png' },
        { id: 4, name: 'Ленточки клубника',   desc: '100 г', price: 130, img: 'ribbon-strawberry.png' },
        { id: 5, name: 'Ленточки вишня',      desc: '100 г', price: 130, img: 'ribbon-cherry.png' },
        { id: 6, name: 'Ленточки бабл-гам',   desc: '100 г', price: 140, img: 'bubblegum.png' },
    ];

    // ============================================================
    //  КОРЗИНА (храним в localStorage)
    // ============================================================
    let cart = JSON.parse(localStorage.getItem('gummyCart')) || {};

    function saveCart() {
        localStorage.setItem('gummyCart', JSON.stringify(cart));
        updateCartUI();
    }

    function getTotalItems() {
        let count = 0;
        for (let id in cart) count += cart[id];
        return count;
    }

    function getTotalSum() {
        let sum = 0;
        for (let id in cart) {
            const p = products.find(x => x.id == id);
            if (p) sum += p.price * cart[id];
        }
        return sum;
    }

    // ============================================================
    //  ПЕРЕКЛЮЧЕНИЕ СТРАНИЦ
    // ============================================================
    function switchPage(pageId) {
        console.log('Переключение на страницу:', pageId);
        
        // скрыть все страницы
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        
        // показать нужную
        const target = document.getElementById('page-' + pageId);
        if (target) {
            target.classList.add('active');
        } else {
            console.error('Страница не найдена:', 'page-' + pageId);
            return;
        }
        
        // обновить активные кнопки
        document.querySelectorAll('.nav-btn[data-page]').forEach(b => {
            b.classList.toggle('active', b.dataset.page === pageId);
        });
        
        // если корзина — обновить содержимое
        if (pageId === 'cart') {
            renderCart();
        }
    }

    // ============================================================
    //  ОТРИСОВКА КАТАЛОГА
    // ============================================================
    function renderCatalog() {
        const grid = document.getElementById('catalogGrid');
        if (!grid) return;
        grid.innerHTML = '';
        
        products.forEach(p => {
            const inCart = cart[p.id] || 0;
            const card = document.createElement('div');
            card.className = 'product-card';

            const img = document.createElement('img');
            img.src = p.img;
            img.alt = p.name;
            img.onerror = function() {
                this.src = 'https://placehold.co/300x300/fde8db/c45a4a?text=' + encodeURIComponent(p.name);
            };

            const name = document.createElement('h3');
            name.textContent = p.name;

            const desc = document.createElement('div');
            desc.textContent = p.desc;
            desc.style.color = '#a77369';
            desc.style.fontWeight = '500';

            const price = document.createElement('div');
            price.className = 'price';
            price.textContent = p.price + ' ₽';

            const btn = document.createElement('button');
            btn.className = 'add-btn' + (inCart > 0 ? ' added' : '');
            btn.textContent = inCart > 0 ? `✅ В корзине (${inCart})` : '➕ Добавить';
            btn.dataset.id = p.id;

            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const id = parseInt(this.dataset.id);
                if (cart[id]) {
                    cart[id]++;
                } else {
                    cart[id] = 1;
                }
                saveCart();
                renderCatalog();
                renderCart();
            });

            card.append(img, name, desc, price, btn);
            grid.appendChild(card);
        });
    }

    // ============================================================
    //  ОТРИСОВКА КОРЗИНЫ
    // ============================================================
    function renderCart() {
        const container = document.getElementById('cartContent');
        if (!container) return;

        const ids = Object.keys(cart);
        if (ids.length === 0) {
            container.innerHTML = `<div class="empty-cart">🛍️ Корзина пуста. Добавьте сладости!</div>`;
            return;
        }

        let html = `<div class="cart-items">`;
        let total = 0;
        ids.forEach(id => {
            const p = products.find(x => x.id == parseInt(id));
            if (!p) return;
            const qty = cart[id];
            const sum = p.price * qty;
            total += sum;
            html += `
                <div class="cart-item">
                    <span class="name">${p.name}</span>
                    <span>${p.price} ₽ × ${qty} = <strong>${sum} ₽</strong></span>
                    <div class="qty">
                        <button data-id="${id}" data-delta="-1">−</button>
                        <span style="min-width:30px;text-align:center;">${qty}</span>
                        <button data-id="${id}" data-delta="1">+</button>
                        <button data-id="${id}" data-delta="0" style="background:#ffd0c0;width:40px;">🗑️</button>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        html += `<div class="cart-total">Итого: ${total} ₽</div>`;
        container.innerHTML = html;

        // обработчики для кнопок + / − / удалить
        container.querySelectorAll('.qty button').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = this.dataset.id;
                const delta = parseInt(this.dataset.delta);
                if (delta === 0) {
                    delete cart[id];
                } else {
                    const newQty = (cart[id] || 0) + delta;
                    if (newQty <= 0) {
                        delete cart[id];
                    } else {
                        cart[id] = newQty;
                    }
                }
                saveCart();
                renderCatalog();
                renderCart();
            });
        });
    }

    // ============================================================
    //  ОБНОВЛЕНИЕ БЕЙДЖА КОРЗИНЫ
    // ============================================================
    function updateCartUI() {
        const badge = document.getElementById('cartCount');
        if (badge) badge.textContent = getTotalItems();
    }

    // ============================================================
    //  НАВИГАЦИЯ (исправленная)
    // ============================================================
    function initNavigation() {
        // Все кнопки с data-page
        document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
            // Удаляем старые обработчики, чтобы не было дублей
            btn.removeEventListener('click', btn._clickHandler);
            
            btn._clickHandler = function(e) {
                e.preventDefault();
                const page = this.dataset.page;
                switchPage(page);
            };
            
            btn.addEventListener('click', btn._clickHandler);
        });
    }

    // ============================================================
    //  ЗАПУСК
    // ============================================================
    renderCatalog();
    renderCart();
    updateCartUI();
    initNavigation();

    console.log('🍬 Gummy House загружен!');
    console.log('Товаров в корзине:', getTotalItems());
</script>

</body>
</html>
